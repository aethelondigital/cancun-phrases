<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cancún">
<meta name="theme-color" content="#0a7e8c">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<title>Cancún Phrases 🌴</title>
<style>
  :root{
    --sea:#0a7e8c; --sea-deep:#075a64; --sand:#f6e7c8; --sun:#ffb703;
    --coral:#ef6f53; --ink:#0d1b1e; --card:#ffffff; --muted:#5d7378;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(165deg,#0a7e8c 0%,#075a64 45%,#0d1b1e 100%);
    background-attachment:fixed;
    color:var(--ink);
    min-height:100vh;
    padding-bottom:128px;
  }
  header{
    padding:18px 16px 12px; text-align:center; color:#fff;
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,#0a7e8c,rgba(10,126,140,0.96));
    backdrop-filter:blur(6px);
    box-shadow:0 2px 14px rgba(0,0,0,.25);
  }
  header h1{margin:0;font-size:22px;letter-spacing:.5px;}
  header p{margin:4px 0 12px;font-size:12.5px;opacity:.85;}
  #search{
    width:100%;padding:12px 14px;border:none;border-radius:14px;
    font-size:16px;outline:none;background:rgba(255,255,255,.95);
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);
  }
  /* category tabs */
  .tabs{
    display:flex;gap:8px;overflow-x:auto;padding:12px 12px 4px;
    position:sticky;top:0;z-index:15;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;padding:9px 15px;border-radius:999px;border:none;
    font-size:14px;font-weight:600;white-space:nowrap;cursor:pointer;
    background:rgba(255,255,255,.18);color:#fff;transition:.15s;
  }
  .tab.active{background:var(--sun);color:var(--ink);box-shadow:0 3px 10px rgba(0,0,0,.3);}
  /* cards — compact 2-up grid so more phrases fit on a phone screen */
  .grid{
    padding:6px 10px 24px;display:grid;gap:8px;align-items:start;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  }
  .card{
    background:var(--card);border-radius:13px;padding:10px 11px;
    box-shadow:0 3px 9px rgba(0,0,0,.16);cursor:pointer;
    border-left:4px solid var(--coral);transition:transform .08s;
    position:relative;
  }
  .card:active{transform:scale(.97);}
  .card .es{font-size:15.5px;font-weight:700;color:var(--sea-deep);line-height:1.2;padding-right:16px;}
  .card .en{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.2;}
  .card .phon{font-size:11px;color:var(--coral);font-style:italic;margin-top:3px;line-height:1.2;}
  .card .spk{
    position:absolute;top:8px;right:8px;font-size:15px;opacity:.45;transition:.2s;
  }
  /* visual confirmation that the phrase is being spoken */
  .card.speaking{border-left-color:var(--sea);background:#eafaf8;}
  .card.speaking .spk{opacity:1;transform:scale(1.25);animation:pulse .7s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1.1);}50%{transform:scale(1.35);}}
  .hint{
    text-align:center;color:rgba(255,255,255,.75);font-size:12px;
    padding:0 20px 14px;line-height:1.5;
  }
  .empty{color:#fff;text-align:center;padding:40px 20px;opacity:.7;}
  /* the card currently being studied */
  .card.current{box-shadow:0 0 0 3px var(--sun),0 4px 12px rgba(0,0,0,.25);}
  /* install banner (scrolls inline, above the player bar) */
  #tip{
    margin:2px 12px 8px;border-radius:12px;
    background:rgba(13,27,30,.85);color:#fff;font-size:12.5px;
    padding:11px 14px;display:flex;gap:10px;align-items:center;
  }
  #tip button{margin-left:auto;background:var(--sun);border:none;color:var(--ink);
    font-weight:700;padding:7px 13px;border-radius:10px;font-size:12.5px;}
  /* Study-mode player bar (fixed at the bottom, two rows) */
  #player{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    display:flex;flex-direction:column;gap:7px;align-items:center;
    padding:9px 12px calc(9px + env(safe-area-inset-bottom));
    background:rgba(13,27,30,.97);backdrop-filter:blur(8px);
    box-shadow:0 -3px 16px rgba(0,0,0,.45);
  }
  #player .prow{display:flex;gap:8px;align-items:center;justify-content:center;}
  #player button{
    border:none;border-radius:12px;font-weight:700;cursor:pointer;
    padding:11px 13px;font-size:16px;background:rgba(255,255,255,.16);color:#fff;
  }
  #player button:active{transform:scale(.94);}
  #player #pPlay{background:var(--sun);color:var(--ink);min-width:118px;font-size:15px;}
  #player #pLoop.on{background:var(--sea);color:#fff;}
  #player #pSpeed{padding:6px 12px;font-size:13px;background:rgba(255,255,255,.12);min-width:54px;}
  #player #pInfo{color:#bfe9ec;font-size:11px;font-weight:600;line-height:1.2;}
</style>

<body>
<header>
  <h1>🌴 Cancún Phrases</h1>
  <p>Tap any card to hear it spoken · works offline</p>
  <input id="search" placeholder="🔍 Search (English or Spanish)…" autocomplete="off">
</header>

<div class="tabs" id="tabs"></div>
<div class="hint" id="hint">Tap a card to hear it 🔊 &nbsp;·&nbsp; or press <b>▶︎ Study</b> below to play this list Spanish → English</div>
<div class="grid" id="grid"></div>

<div id="tip">
  📲 Add to Home Screen so it works like an app, even with no signal.
  <button onclick="document.getElementById('tip').remove()">Got it</button>
</div>

<!-- Study-mode player: walks the current list, speaking Spanish then English -->
<div id="player">
  <div class="prow">
    <button id="pSpeed" title="Playback speed">1.0×</button>
    <span id="pInfo">Spanish → English</span>
  </div>
  <div class="prow">
    <button id="pPrev" title="Previous">⏮</button>
    <button id="pPlay">▶︎ Study</button>
    <button id="pNext" title="Next">⏭</button>
    <button id="pLoop" class="on" title="Repeat list">🔁</button>
  </div>
</div>

const cats = Object.keys(DATA);
let active = cats[0];
const tabsEl = document.getElementById('tabs');
const gridEl = document.getElementById('grid');
const searchEl = document.getElementById('search');
const hintEl = document.getElementById('hint');

// build tabs
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='tab'+(c===active?' active':'');
  b.textContent=c;
  b.onclick=()=>{active=c;searchEl.value='';render();
    [...tabsEl.children].forEach(t=>t.classList.toggle('active',t.textContent===c));};
  tabsEl.appendChild(b);
});

let esVoice=null;
function voiceScore(v){
  const id=(v.voiceURI+' '+v.name).toLowerCase();
  let s=0;
  // accent: Mexican first, then other Latin American, then any Spanish
  const lang=v.lang.toLowerCase();
  if(lang.startsWith('es-mx')) s+=100;
  else if(lang.startsWith('es-us')||lang.startsWith('es-419')||lang.startsWith('es-co')||lang.startsWith('es-ar')) s+=60;
  else if(lang.startsWith('es')) s+=30;
  else return -1; // not Spanish
  // quality: prefer the natural/neural voices, avoid the robotic "compact" ones
  if(id.includes('premium')||id.includes('neural')) s+=40;
  if(id.includes('enhanced')) s+=30;
  if(id.includes('compact')) s-=30;
  return s;
}
// English fallback voice (for Study mode). Spanish = esVoice.
let enVoice=null;
function pickVoice(){
  const v=speechSynthesis.getVoices();
  let best=null,bestScore=-1;
  for(const x of v){const sc=voiceScore(x); if(sc>bestScore){bestScore=sc;best=x;}}
  esVoice=best;
  // best English voice: prefer enhanced/premium en-US, avoid compact
  let eb=null,ebs=-1;
  for(const x of v){
    const lang=x.lang.toLowerCase(); if(!lang.startsWith('en'))continue;
    const id=(x.voiceURI+' '+x.name).toLowerCase();
    let s=lang.startsWith('en-us')?50:20;
    if(id.includes('premium')||id.includes('neural'))s+=40;
    if(id.includes('enhanced'))s+=30;
    if(id.includes('compact'))s-=30;
    if(s>ebs){ebs=s;eb=x;}
  }
  enVoice=eb;
}

let currentAudio=null;
// Playback speed multiplier (1.0 = the app's comfortable default pace). Remembered.
const SPEEDS=[0.8,1.0,1.25,1.5];
let speed=parseFloat(localStorage.getItem('cp_speed'));
if(!SPEEDS.includes(speed)) speed=1.0;
function fmtSpeed(s){ return (Number.isInteger(s)?s.toFixed(1):String(s))+'×'; }
function setSpeaking(cardEl,on){ if(cardEl) cardEl.classList.toggle('speaking',on); }
function stopAll(){
  if('speechSynthesis' in window) speechSynthesis.cancel();
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
}

// Play one clip and resolve a promise when it finishes (so clips can be chained).
// Spanish prefers the bundled human recording; English uses device TTS.
function playClip(text,lang,cardEl){
  return new Promise(resolve=>{
    if(lang==='es' && window.AUDIO_MAP && window.AUDIO_MAP[text]){
      stopAll();
      const a=new Audio(window.AUDIO_MAP[text]); currentAudio=a;
      a.playbackRate=speed; a.preservesPitch=true; a.mozPreservesPitch=true; a.webkitPreservesPitch=true;
      setSpeaking(cardEl,true);
      const done=()=>{ setSpeaking(cardEl,false); resolve(); };
      a.onended=done;
      a.onerror=()=>{ setSpeaking(cardEl,false); ttsClip(text,lang,cardEl).then(resolve); };
      a.play().catch(()=>{ setSpeaking(cardEl,false); ttsClip(text,lang,cardEl).then(resolve); });
      return;
    }
    ttsClip(text,lang,cardEl).then(resolve);
  });
}
function ttsClip(text,lang,cardEl){
  return new Promise(resolve=>{
    if(!('speechSynthesis' in window)){ resolve(); return; }
    stopAll();
    if(!esVoice||!enVoice) pickVoice();
    const u=new SpeechSynthesisUtterance(text);
    if(lang==='en'){ u.lang='en-US'; if(enVoice)u.voice=enVoice; u.rate=0.95*speed; }
    else { u.lang='es-MX'; if(esVoice)u.voice=esVoice; u.rate=0.85*speed; }
    u.pitch=1;
    u.onstart=()=>setSpeaking(cardEl,true);
    u.onend=()=>{ setSpeaking(cardEl,false); resolve(); };
    u.onerror=()=>{ setSpeaking(cardEl,false); resolve(); };
    setTimeout(()=>speechSynthesis.speak(u),10);
  });
}
// Single tap = Spanish only.
function speak(text,cardEl){ playClip(text,'es',cardEl); }

function card(es,en,phon){
  const d=document.createElement('div');
  d.className='card';
  d.dataset.es=es; d.dataset.en=en;
  d.innerHTML=`<div class="spk">🔊</div>
    <div class="es">${es}</div>
    <div class="en">${en}</div>
    <div class="phon">${phon}</div>`;
  d.onclick=()=>{ if(!study.on) speak(es,d); else { study.idx=[...gridEl.children].indexOf(d); studyRestart(); } };
  return d;
}

function render(){
  if(typeof study!=='undefined'){ if(study.on) studyStop(); study.idx=0; }
  gridEl.innerHTML='';
  const q=searchEl.value.trim().toLowerCase();
  let rows=[];
  if(q){
    hintEl.style.display='none';
    cats.forEach(c=>DATA[c].forEach(r=>{
      if(r[0].toLowerCase().includes(q)||r[1].toLowerCase().includes(q))rows.push(r);
    }));
  }else{
    hintEl.style.display='';
    rows=DATA[active];
  }
  if(!rows.length){gridEl.innerHTML='<div class="empty">No phrases found 🤷</div>';return;}
  rows.forEach(r=>gridEl.appendChild(card(r[0],r[1],r[2])));
}

/* ---------- Study mode: hands-free Spanish → English playback ---------- */
const study={on:false,idx:0,loop:true,token:0,gap:550};
const pPlay=document.getElementById('pPlay');
const pPrev=document.getElementById('pPrev');
const pNext=document.getElementById('pNext');
const pLoop=document.getElementById('pLoop');
const pInfo=document.getElementById('pInfo');
const pSpeed=document.getElementById('pSpeed');

pSpeed.textContent=fmtSpeed(speed);
pSpeed.onclick=()=>{
  speed=SPEEDS[(SPEEDS.indexOf(speed)+1)%SPEEDS.length];
  localStorage.setItem('cp_speed',speed);
  pSpeed.textContent=fmtSpeed(speed);
  if(currentAudio) currentAudio.playbackRate=speed;   // apply live to a playing clip
};

function cardsNow(){ return [...gridEl.querySelectorAll('.card')]; }
function clearCurrent(){ cardsNow().forEach(c=>c.classList.remove('current')); }
function setCurrent(c){ clearCurrent(); if(c) c.classList.add('current'); }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

function updatePlayer(){
  const total=cardsNow().length;
  pPlay.textContent = study.on ? '⏸ Pause' : '▶︎ Study';
  pLoop.classList.toggle('on',study.loop);
  pInfo.textContent = total ? ((study.on?'▶ ':'')+Math.min(study.idx+1,total)+' / '+total+'  ES→EN') : 'Spanish → English';
}

async function studyRun(){
  const my=++study.token; study.on=true; updatePlayer(); keepAwake();
  const cards=cardsNow();
  while(study.on && my===study.token){
    if(study.idx>=cards.length){ if(study.loop){ study.idx=0; } else break; }
    const c=cards[study.idx]; if(!c) break;
    setCurrent(c);
    c.scrollIntoView({block:'center',behavior:'smooth'});
    updatePlayer();
    await playClip(c.dataset.es,'es',c);     if(my!==study.token||!study.on) return;
    await wait(study.gap);                    if(my!==study.token||!study.on) return;
    await playClip(c.dataset.en,'en',null);   if(my!==study.token||!study.on) return;
    await wait(study.gap+250);                if(my!==study.token||!study.on) return;
    study.idx++;
  }
  if(my===study.token){ study.on=false; clearCurrent(); updatePlayer(); releaseAwake(); }
}
function studyStart(){ if(study.on) return; studyRun(); }
function studyStop(){ study.token++; study.on=false; stopAll(); clearCurrent(); updatePlayer(); releaseAwake(); }
function studyRestart(){ study.token++; studyRun(); }
function moveTo(i){ const t=cardsNow().length; study.idx=Math.max(0,Math.min(t-1,i));
  if(study.on) studyRestart(); else { setCurrent(cardsNow()[study.idx]); updatePlayer(); } }

pPlay.onclick=()=>{ study.on?studyStop():studyStart(); };
pPrev.onclick=()=>moveTo(study.idx-1);
pNext.onclick=()=>moveTo(study.idx+1);
pLoop.onclick=()=>{ study.loop=!study.loop; updatePlayer(); };

/* keep the screen awake while studying (best-effort; iOS may ignore when locked) */
let wakeLock=null;
async function keepAwake(){ try{ if('wakeLock' in navigator) wakeLock=await navigator.wakeLock.request('screen'); }catch(e){} }
function releaseAwake(){ try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){} }
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&study.on) keepAwake(); });

searchEl.addEventListener('input',render);
// voices load asynchronously on iPhone/Safari — grab them whenever ready
if('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged=pickVoice;
}
render();
updatePlayer();

// Register the offline service worker (works once the app is served over https).
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
