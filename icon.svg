<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d3b41"/>
      <stop offset="1" stop-color="#0a1416"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19c2cf"/>
      <stop offset="1" stop-color="#0a7e8c"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- dark rounded tile + accent border -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="url(#sea)" stroke-width="14" opacity="0.9"/>
  <!-- glowing speech bubble -->
  <g filter="url(#glow)">
    <path d="M150 150 h212 a40 40 0 0 1 40 40 v104 a40 40 0 0 1 -40 40 h-150 l-58 50 v-50 h-4 a40 40 0 0 1 -40 -40 v-104 a40 40 0 0 1 40 -40 z"
          fill="none" stroke="url(#sea)" stroke-width="16" stroke-linejoin="round"/>
    <!-- three dots = "talking" -->
    <circle cx="206" cy="242" r="16" fill="#ffb703"/>
    <circle cx="256" cy="242" r="16" fill="#19c2cf"/>
    <circle cx="306" cy="242" r="16" fill="#ef6f53"/>
  </g>
</svg>
